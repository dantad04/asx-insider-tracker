<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Profile - ASX Insider Tracker</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/app-pages.css">
  <style>
    .company-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: var(--space-6);
      grid-template-columns: minmax(260px, 1fr) minmax(420px, 1.2fr);
      padding: var(--space-6);
    }

    .company-hero-main {
      align-content: start;
      display: grid;
      gap: var(--space-2);
      min-width: 0;
    }

    .company-hero-main h1 {
      font-family: var(--font-serif);
      font-size: var(--text-display);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-tight);
      line-height: 1.08;
      margin: 0;
    }

    .company-sector {
      color: var(--text-2);
      font-size: var(--text-md);
      line-height: var(--line-body);
    }

    .company-stat-grid {
      display: grid;
      gap: var(--space-3);
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .company-stat-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: var(--space-2);
      min-height: 96px;
      padding: var(--space-4);
    }

    .company-stat-card .stat-value {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      line-height: var(--line-tight);
    }

    .company-stat-card .stat-label {
      color: var(--text-2);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-label);
      line-height: var(--line-ui);
      text-transform: uppercase;
    }

    .director-grid {
      display: grid;
      gap: var(--space-4);
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }

    .director-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      display: grid;
      gap: var(--space-3);
      padding: var(--space-5);
      text-decoration: none;
      transition:
        background-color var(--duration-hover) var(--ease-finished),
        border-color var(--duration-hover) var(--ease-finished);
    }

    .director-card:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
      color: var(--text);
      text-decoration: none;
    }

    .director-name {
      color: var(--text);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      line-height: var(--line-ui);
    }

    .director-meta,
    .director-values {
      color: var(--text-2);
      font-size: var(--text-sm);
      line-height: var(--line-ui);
    }

    .director-values {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .badge {
      align-items: center;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      display: inline-flex;
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      height: var(--tag-height);
      padding: 0 var(--space-2);
      white-space: nowrap;
    }

    .type-badge.buy {
      background: var(--buy-soft);
      color: var(--buy);
    }

    .type-badge.sell,
    .severity.severe {
      background: var(--sell-soft);
      color: var(--sell);
    }

    .type-badge.off {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--text-2);
    }

    .severity.minor {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .severity.moderate {
      background: var(--accent-soft);
      color: var(--accent-hover);
    }

    .company-link {
      color: var(--accent);
      font-weight: var(--weight-medium);
      text-decoration: none;
    }

    .company-link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .loading-panel {
      min-height: 240px;
    }

    @media (max-width: 1120px) {
      .company-hero {
        grid-template-columns: 1fr;
      }

      .company-stat-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .company-hero {
        padding: var(--space-4);
      }

      .company-hero-main h1 {
        font-size: var(--text-3xl);
      }

      .company-stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .director-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand-mark" href="/static/index.html" aria-label="ASX Insider Tracker home">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"></path>
          <path d="M7 16V9"></path>
          <path d="M12 16V5"></path>
          <path d="M17 16v-3"></path>
        </svg>
        <span>ASX Insider Tracker</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="site-nav-link" href="/clusters">Cluster Buys</a>
        <a class="site-nav-link site-nav-cta" href="/contracts">Contracts</a>
        <a class="site-nav-link" href="/clusters/portfolio">Cluster Portfolio</a>
        <a class="site-nav-link" href="/static/about.html">About</a>
        <a class="site-nav-link" href="/docs">API Docs</a>
      </nav>
      <div class="header-actions">
        <details class="mobile-nav-menu">
          <summary class="mobile-menu-summary">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M4 6h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 18h16"></path>
            </svg>
            Menu
          </summary>
          <nav class="mobile-nav-panel" aria-label="Mobile navigation">
            <a class="site-nav-link" href="/clusters">Cluster Buys</a>
            <a class="site-nav-link site-nav-cta" href="/contracts">Contracts</a>
            <a class="site-nav-link" href="/clusters/portfolio">Cluster Portfolio</a>
            <a class="site-nav-link" href="/static/about.html">About</a>
            <a class="site-nav-link" href="/docs">API Docs</a>
          </nav>
        </details>
        <button class="header-icon-button" type="button" onclick="toggleDark()" aria-label="Toggle dark mode">
          <svg class="theme-icon-moon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path>
          </svg>
          <svg class="theme-icon-sun" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path><path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path><path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page-shell" id="app">
    <div class="empty-panel loading-panel">
      <div>
        <div class="empty-panel-title">Loading company profile</div>
        <div class="empty-panel-copy">Fetching latest director trade records.</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span>&copy; 2026 ASX Insider Tracker - Data sourced from ASX announcements.</span>
      <div class="footer-links">
        <a href="/static/index.html">Trade Feed</a>
        <a href="/clusters">Cluster Buys</a>
        <a href="/docs">API Docs</a>
      </div>
    </div>
  </footer>

  <script>
    const ticker = new URLSearchParams(location.search).get('ticker') || '';
    const THEME_STORAGE_KEY = 'theme';

    if (!ticker) {
      document.getElementById('app').innerHTML = `
        <div class="empty-panel">
          <div>
            <div class="empty-panel-title">No ticker specified</div>
            <div class="empty-panel-copy"><a class="company-link" href="/static/index.html">Return to the trade feed</a></div>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function fmt(d) {
      if (!d) return '-';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'});
    }
    function fmtCcy(v) {
      if (v === null || v === undefined || v === '') return '-';
      const n = parseFloat(v);
      if (isNaN(n) || n === 0) return '-';
      if (n < 0.01) return '$' + n.toLocaleString('en-AU', {minimumFractionDigits:4,maximumFractionDigits:4});
      if (n < 1)    return '$' + n.toLocaleString('en-AU', {minimumFractionDigits:3,maximumFractionDigits:3});
      return '$' + n.toLocaleString('en-AU', {minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function fmtNum(v) {
      if (v === null || v === undefined) return '-';
      return Math.abs(parseInt(v, 10)).toLocaleString();
    }
    function fmtVal(qty, price) {
      if (!qty || !price) return '-';
      const v = Math.abs(qty) * Math.abs(price);
      if (v === 0) return '-';
      return '$' + v.toLocaleString('en-AU', {minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function typeLabel(t) {
      return {on_market_buy:'Buy',on_market_sell:'Sell',off_market:'Off-Market',exercise_options:'Options',other:'Other'}[t] || t || 'Other';
    }
    function typeCls(t) {
      const value = String(t || '');
      if (value.includes('buy')) return 'buy';
      if (value.includes('sell')) return 'sell';
      return 'off';
    }

    async function load() {
      const res = await fetch(`/api/company/${encodeURIComponent(ticker)}`);
      if (!res.ok) {
        document.getElementById('app').innerHTML = `
          <div class="empty-panel">
            <div>
              <div class="empty-panel-title">Company ${escapeHtml(ticker)} not found</div>
              <div class="empty-panel-copy">Check the ticker and try again from the trade feed.</div>
            </div>
          </div>
        `;
        return;
      }
      const d = await res.json();
      document.title = `${d.ticker} - ASX Insider Tracker`;

      const buyTotal = d.directors.reduce((s,x) => s + x.buy_value, 0);
      const sellTotal = d.directors.reduce((s,x) => s + x.sell_value, 0);

      document.getElementById('app').innerHTML = `
        <section class="company-hero" aria-labelledby="companyTitle">
          <div class="company-hero-main">
            <span class="tag-ticker">${escapeHtml(d.ticker)}</span>
            <h1 id="companyTitle">${escapeHtml(d.name)}</h1>
            <p class="company-sector">${escapeHtml(d.sector || 'Sector unknown')}</p>
          </div>
          <div class="company-stat-grid" aria-label="Company trade summary">
            <div class="company-stat-card"><div class="stat-value">${d.trades.length}</div><div class="stat-label">Trades</div></div>
            <div class="company-stat-card"><div class="stat-value">${d.directors.length}</div><div class="stat-label">Directors</div></div>
            <div class="company-stat-card"><div class="stat-value metric-buy">${fmtCcy(buyTotal)}</div><div class="stat-label">Buy value</div></div>
            <div class="company-stat-card"><div class="stat-value metric-sell">${fmtCcy(sellTotal)}</div><div class="stat-label">Sell value</div></div>
            <div class="company-stat-card"><div class="stat-value ${d.violations.length > 0 ? 'metric-sell' : 'metric-buy'}">${d.violations.length}</div><div class="stat-label">Violations</div></div>
          </div>
        </section>

        <section class="page-section" aria-labelledby="directorsTitle">
          <div class="page-section-header">
            <div>
              <h2 id="directorsTitle">Directors</h2>
              <p>${d.directors.length} director${d.directors.length !== 1 ? 's' : ''} with recorded trading activity.</p>
            </div>
          </div>
          <div class="director-grid">
            ${d.directors.map(dir => `
              <a class="director-card" href="/static/director.html?id=${dir.id}">
                <span class="director-name">${escapeHtml(dir.name)}</span>
                <span class="director-meta">${dir.trade_count} trade${dir.trade_count !== 1 ? 's' : ''}</span>
                <span class="director-values">
                  <span class="metric-buy">${fmtCcy(dir.buy_value)} bought</span>
                  <span class="metric-sell">${fmtCcy(dir.sell_value)} sold</span>
                </span>
              </a>
            `).join('')}
          </div>
        </section>

        <section class="page-section" aria-labelledby="tradesTitle">
          <div class="page-section-header">
            <div>
              <h2 id="tradesTitle">All Trades</h2>
              <p>${d.trades.length} transaction${d.trades.length !== 1 ? 's' : ''} on record.</p>
            </div>
          </div>
          ${d.trades.length === 0 ? `
            <div class="empty-panel"><div><div class="empty-panel-title">No trades on record</div></div></div>
          ` : `
            <div class="table-shell">
              <div class="table-scroll">
                <table class="table">
                  <thead><tr>
                    <th>Date</th><th>Director</th><th>Type</th>
                    <th class="right">Quantity</th><th class="right">Price</th>
                    <th class="right">Value</th>
                  </tr></thead>
                  <tbody>
                    ${d.trades.map(t => `
                      <tr>
                        <td>${fmt(t.date_of_trade)}</td>
                        <td><a class="company-link" href="/static/director.html?id=${t.director_id}">${escapeHtml(t.director_name)}</a></td>
                        <td><span class="badge type-badge ${typeCls(t.trade_type)}">${escapeHtml(typeLabel(t.trade_type))}</span></td>
                        <td class="right num">${fmtNum(t.quantity)}</td>
                        <td class="right money">${fmtCcy(t.price_per_share)}</td>
                        <td class="right money">${fmtVal(t.quantity, t.price_per_share)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `}
        </section>

        <section class="page-section" aria-labelledby="complianceTitle">
          <div class="page-section-header">
            <div>
              <h2 id="complianceTitle">Compliance Violations</h2>
              <p>${d.violations.length} verified late lodgement${d.violations.length !== 1 ? 's' : ''} on record.</p>
            </div>
          </div>
          ${d.violations.length === 0 ? `
            <div class="empty-panel"><div><div class="empty-panel-title">No verified violations on record</div></div></div>
          ` : `
            <div class="table-shell">
              <div class="table-scroll">
                <table class="table">
                  <thead><tr>
                    <th>Trade Date</th><th>Lodged Date</th><th>Director</th>
                    <th class="right">Days Late</th><th>Severity</th>
                  </tr></thead>
                  <tbody>
                    ${d.violations.map(v => `
                      <tr>
                        <td>${fmt(v.date_of_trade)}</td>
                        <td>${fmt(v.date_lodged)}</td>
                        <td>${escapeHtml(v.director_name)}</td>
                        <td class="right num"><strong>${v.days_late}</strong></td>
                        <td><span class="badge severity ${escapeHtml(v.severity)}">${escapeHtml(v.severity)}</span></td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `}
        </section>
      `;
    }

    function toggleDark() {
      applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    }

    function preferredTheme() {
      const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      if (storedTheme === 'dark' || storedTheme === 'light') return storedTheme;
      const legacyDarkMode = localStorage.getItem('darkMode');
      if (legacyDarkMode === 'true') return 'dark';
      if (legacyDarkMode === 'false') return 'light';
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme, persist = true) {
      document.documentElement.dataset.theme = theme;
      if (persist) {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
        localStorage.setItem('darkMode', theme === 'dark' ? 'true' : 'false');
      }
    }

    applyTheme(preferredTheme(), false);
    if (ticker) load();
  </script>
</body>
</html>
