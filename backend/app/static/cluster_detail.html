  <script src="/static/vendor/uplot/uPlot.iife.min.js"></script>
  <script>
    let clusterPriceChart = null;
    let clusterPricePayload = null;
    let clusterMarkerHitboxes = [];
    const THEME_STORAGE_KEY = 'theme';

    function toggleDark() {
      applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    }

    function preferredTheme() {
      const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      if (storedTheme === 'dark' || storedTheme === 'light') return storedTheme;
      const legacyDarkMode = localStorage.getItem('darkMode');
      if (legacyDarkMode === 'true') return 'dark';
      if (legacyDarkMode === 'false') return 'light';
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme, persist = true) {
      document.documentElement.dataset.theme = theme;
      if (persist) {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
        localStorage.setItem('darkMode', theme === 'dark' ? 'true' : 'false');
      }
      if (clusterPricePayload) window.requestAnimationFrame(() => renderClusterPriceChart(clusterPricePayload));
    }

    function emptyIcon() {
      return `<svg class="empty-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="m7 15 4-4 3 3 5-7"></path></svg>`;
    }

    applyTheme(preferredTheme(), false);

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function fmtMoney(value) {
      const n = Number(value);
      if (value === null || value === undefined || Number.isNaN(n)) return '-';
      if (Math.abs(n) >= 1_000_000_000) return `$${(n / 1_000_000_000).toFixed(1)}B`;
      if (Math.abs(n) >= 1_000_000) return `$${(n / 1_000_000).toFixed(1)}M`;
      if (Math.abs(n) >= 1_000) return `$${Math.round(n / 1_000)}K`;
      return `$${Math.round(n)}`;
    }

    function fmtPrice(value) {
      const n = Number(value);
      if (value === null || value === undefined || Number.isNaN(n)) return '-';
      return `$${n.toFixed(n < 1 ? 4 : 2)}`;
    }

    function fmtFullMoney(value) {
      const n = Number(value);
      if (value === null || value === undefined || Number.isNaN(n)) return '-';
      return new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD', maximumFractionDigits: 0 }).format(n);
    }

    function parseDate(value) {
      if (!value) return null;
      const date = new Date(`${value}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function fmtDate(value) {
      const date = parseDate(value);
      if (!date) return '-';
      const day = date.getDate();
      const month = date.toLocaleDateString('en-AU', { month: 'short' });
      const year = String(date.getFullYear()).slice(-2);
      return `${day} ${month} '${year}`;
    }

    function fmtWindow(start, end) {
      if (!start && !end) return '-';
      if (!start || start === end) return fmtDate(end || start);
      const s = parseDate(start);
      const e = parseDate(end);
      if (s && e && s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear()) {
        const month = e.toLocaleDateString('en-AU', { month: 'short' });
        const year = String(e.getFullYear()).slice(-2);
        return `${s.getDate()}-${e.getDate()} ${month} '${year}`;
      }
      return `${fmtDate(start)} - ${fmtDate(end)}`;
    }

    function fmtLongDate(value) {
      const date = parseDate(value);
      if (!date) return '-';
      return date.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function fmtNumber(value) {
      const n = Number(value);
      if (value === null || value === undefined || Number.isNaN(n)) return '-';
      return n.toLocaleString('en-AU');
    }

    function fmtPct(value) {
      const n = Number(value);
      if (value === null || value === undefined || Number.isNaN(n)) return '-';
      return `${(n * 100).toFixed(2)}%`;
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function rgbaFromCss(value, alpha) {
      if (value.startsWith('#')) {
        const hex = value.slice(1);
        const full = hex.length === 3 ? hex.split('').map(char => char + char).join('') : hex;
        const int = Number.parseInt(full, 16);
        return `rgba(${(int >> 16) & 255}, ${(int >> 8) & 255}, ${int & 255}, ${alpha})`;
      }
      if (value.startsWith('rgb(')) return value.replace('rgb(', 'rgba(').replace(')', `, ${alpha})`);
      return value;
    }

    function chartAxes() {
      const text2 = cssVar('--text-2');
      const border = rgbaFromCss(cssVar('--border'), 0.5);
      const font = `12px ${cssVar('--font-mono')}`;
      return [
        {
          stroke: text2,
          grid: { stroke: border, width: 1 },
          font,
        },
        {
          stroke: text2,
          grid: { stroke: border, width: 1 },
          font,
          values: (_u, vals) => vals.map(value => value < 1 ? value.toFixed(3) : value.toFixed(2)),
        },
      ];
    }

    function chartSize(stage) {
      return {
        width: Math.max(320, Math.floor(stage.clientWidth)),
        height: Math.floor(stage.clientHeight || (window.innerWidth < 768 ? 220 : 320)),
      };
    }

    function showClusterChartSkeleton(stage) {
      if (clusterPriceChart) {
        clusterPriceChart.destroy();
        clusterPriceChart = null;
      }
      stage.classList.remove('is-empty');
      stage.innerHTML = '<span class="skeleton skeleton-block"></span>';
    }

    function showClusterChartEmpty(stage, title = 'No price history available') {
      if (clusterPriceChart) {
        clusterPriceChart.destroy();
        clusterPriceChart = null;
      }
      stage.classList.add('is-empty');
      stage.innerHTML = `
        <div class="chart-empty">
          <div>
            ${emptyIcon()}
            <div class="empty-panel-title">${escapeHtml(title)}</div>
            <div class="empty-panel-copy">Stored price history is required before the overlay can render.</div>
            <button class="btn btn-ghost btn-sm" type="button" onclick="loadClusterPriceHistory()">Retry</button>
          </div>
        </div>`;
    }

    function normalizeTradeType(value) {
      const raw = String(value || '').toLowerCase();
      if (raw.includes('sell')) return 'Sell';
      if (raw.includes('off')) return 'Off-market';
      if (raw.includes('buy')) return 'Buy';
      return 'Other';
    }

    function tradeMarkerColor(type) {
      if (type === 'Buy') return cssVar('--buy');
      if (type === 'Sell') return cssVar('--sell');
      return cssVar('--text-3');
    }

    function markerSize(value) {
      const n = Number(value || 0);
      return Math.min(12, Math.max(5, Math.sqrt(Math.max(n, 0)) / 120));
    }

    function nearestPrice(points, targetDate) {
      if (!points.length) return null;
      const target = new Date(`${targetDate}T00:00:00`).getTime();
      let best = points[0];
      let bestDistance = Math.abs(new Date(`${best.date}T00:00:00`).getTime() - target);
      for (const point of points) {
        const distance = Math.abs(new Date(`${point.date}T00:00:00`).getTime() - target);
        if (distance < bestDistance) {
          best = point;
          bestDistance = distance;
        }
      }
      return best.close;
    }

    function drawTriangle(ctx, x, y, size, direction) {
      ctx.beginPath();
      if (direction === 'up') {
        ctx.moveTo(x, y - size);
        ctx.lineTo(x - size, y + size);
        ctx.lineTo(x + size, y + size);
      } else {
        ctx.moveTo(x, y + size);
        ctx.lineTo(x - size, y - size);
        ctx.lineTo(x + size, y - size);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawTradeMarkers(chart, payload) {
      const points = payload.points || [];
      clusterMarkerHitboxes = [];
      const ctx = chart.ctx;
      for (const trade of payload.trades || []) {
        const type = normalizeTradeType(trade.trade_type);
        const close = nearestPrice(points, trade.date);
        if (close === null || close === undefined) continue;
        const timestamp = Math.floor(new Date(`${trade.date}T00:00:00`).getTime() / 1000);
        const x = chart.valToPos(timestamp, 'x', true);
        const y = chart.valToPos(close, 'y', true);
        const size = markerSize(trade.value_aud);
        ctx.save();
        ctx.fillStyle = tradeMarkerColor(type);
        ctx.strokeStyle = cssVar('--surface');
        ctx.lineWidth = 1.5;
        if (type === 'Buy') {
          drawTriangle(ctx, x, y, size, 'up');
          ctx.stroke();
        } else if (type === 'Sell') {
          drawTriangle(ctx, x, y, size, 'down');
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
        ctx.restore();
        clusterMarkerHitboxes.push({ x, y, radius: size + 5, trade, type });
      }
    }

    function showMarkerTooltip(stage, marker, event) {
      let tooltip = stage.querySelector('.chart-tooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.className = 'chart-tooltip';
        stage.appendChild(tooltip);
      }
      tooltip.innerHTML = `
        <div class="chart-tooltip-title">${escapeHtml(marker.trade.director_name)}</div>
        <div class="chart-tooltip-row"><span>Type</span><span class="chart-tooltip-value">${escapeHtml(marker.type)}</span></div>
        <div class="chart-tooltip-row"><span>Value</span><span class="chart-tooltip-value">${fmtFullMoney(marker.trade.value_aud)}</span></div>
        <div class="chart-tooltip-row"><span>Date</span><span class="chart-tooltip-value">${fmtLongDate(marker.trade.date)}</span></div>`;
      const rect = stage.getBoundingClientRect();
      const left = Math.min(stage.clientWidth - tooltip.offsetWidth - 8, Math.max(8, event.clientX - rect.left + 16));
      const top = Math.min(stage.clientHeight - tooltip.offsetHeight - 8, Math.max(8, event.clientY - rect.top + 16));
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
      tooltip.classList.add('is-visible');
    }

    function attachMarkerHover(stage) {
      stage.onmousemove = event => {
        const rect = stage.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const marker = clusterMarkerHitboxes.find(item => Math.hypot(item.x - x, item.y - y) <= item.radius);
        const tooltip = stage.querySelector('.chart-tooltip');
        if (!marker) {
          if (tooltip) tooltip.classList.remove('is-visible');
          return;
        }
        showMarkerTooltip(stage, marker, event);
      };
      stage.onmouseleave = () => {
        const tooltip = stage.querySelector('.chart-tooltip');
        if (tooltip) tooltip.classList.remove('is-visible');
      };
    }

    function updateLastPrice(payload) {
      const last = (payload.points || []).at(-1);
      const node = document.getElementById('lastPriceValue');
      if (node) node.textContent = last ? fmtPrice(last.close) : '-';
    }

    function renderClusterPriceChart(payload) {
      const stage = document.getElementById('clusterPriceChartStage');
      if (!stage) return;
      const points = payload.points || [];
      if (!window.uPlot || points.length < 2) {
        showClusterChartEmpty(stage);
        return;
      }

      clusterPricePayload = payload;
      if (clusterPriceChart) clusterPriceChart.destroy();
      stage.classList.remove('is-empty');
      stage.innerHTML = '';

      const opts = {
        ...chartSize(stage),
        cursor: { drag: { x: false, y: false } },
        scales: { x: { time: true } },
        axes: chartAxes(),
        series: [
          {},
          { label: 'Close', stroke: cssVar('--accent'), width: 2, spanGaps: true, points: { show: false } },
        ],
        hooks: {
          draw: [chart => drawTradeMarkers(chart, payload)],
        },
      };
      const data = [
        points.map(point => Math.floor(new Date(`${point.date}T00:00:00`).getTime() / 1000)),
        points.map(point => point.close),
      ];
      clusterPriceChart = new uPlot(opts, data, stage);
      attachMarkerHover(stage);
      updateLastPrice(payload);
    }

    async function loadClusterPriceHistory(clusterId = Number(window.location.pathname.split('/').filter(Boolean).pop())) {
      const stage = document.getElementById('clusterPriceChartStage');
      if (!stage || !clusterId) return;
      showClusterChartSkeleton(stage);
      try {
        const response = await fetch(`/api/clusters/${clusterId}/price-history?days=120`);
        if (!response.ok) throw new Error('price history fetch failed');
        const payload = await response.json();
        if (!payload.points || payload.points.length < 2) {
          showClusterChartEmpty(stage);
          return;
        }
        renderClusterPriceChart(payload);
      } catch (error) {
        showClusterChartEmpty(stage, 'Unable to load price history');
      }
    }

    function statusBadge(status) {
      const label = status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown';
      const cls = status === 'historical' ? 'badge-soft' : status === 'active' ? 'badge-info-soft' : 'badge-warn-soft';
      return `<span class="badge ${cls}">${escapeHtml(label)}</span>`;
    }

    function signalClass(count) {
      if (Number(count || 0) >= 6) return 'signal-high';
      if (Number(count || 0) >= 4) return 'signal-medium';
      return 'signal-base';
    }

    function clusterDescriptor(cluster) {
      if (cluster.industry && cluster.sector) return `${cluster.industry} - ${cluster.sector}`;
      return cluster.industry || cluster.sector || 'Sector unavailable';
    }

    function renderRelatedCluster(cluster) {
      return `
        <a class="cluster-row ${signalClass(cluster.director_count)}" href="/clusters/${cluster.cluster_id}">
          <span class="cluster-count">${Number(cluster.director_count || 0).toLocaleString('en-AU')} directors</span>
          <span class="tag-ticker">${escapeHtml(cluster.ticker)}</span>
          <span class="cluster-main">
            <span class="cluster-title">${escapeHtml(clusterDescriptor(cluster))}</span>
            <span class="cluster-subtitle">${escapeHtml(cluster.market_cap_bucket || 'Market cap bucket unavailable')}</span>
          </span>
          <span class="cluster-date">${escapeHtml(fmtWindow(cluster.start_date, cluster.end_date))}</span>
          <span class="cluster-value">${fmtMoney(cluster.total_value_aud)}</span>
          <span class="cluster-meta">${statusBadge(cluster.status)}</span>
        </a>`;
    }

    function renderTimelineTrade(trade) {
      return `
        <div class="timeline-row">
          <span>
            <span class="cluster-title">${escapeHtml(trade.director_name)}</span>
            <span class="cluster-subtitle">Director trade</span>
          </span>
          <span class="cluster-date">${fmtDate(trade.date_of_trade)}</span>
          <span class="cluster-date">${fmtDate(trade.date_lodged)}</span>
          <span class="right money">${fmtMoney(trade.value_aud)}</span>
          <span class="right num">${fmtNumber(trade.number_of_securities)}</span>
        </div>`;
    }

    async function fetchCompany(ticker) {
      try {
        const res = await fetch(`/api/company/${encodeURIComponent(ticker)}`);
        return res.ok ? await res.json() : null;
      } catch (error) {
        return null;
      }
    }

    async function fetchOtherClusters(ticker, currentClusterId) {
      try {
        const res = await fetch('/api/clusters?sort=start_date&order=desc&per_page=200');
        if (!res.ok) return [];
        const data = await res.json();
        return (data.clusters || []).filter(cluster => cluster.ticker === ticker && cluster.cluster_id !== currentClusterId);
      } catch (error) {
        return [];
      }
    }

    async function init() {
      const clusterId = Number(window.location.pathname.split('/').filter(Boolean).pop());
      if (!clusterId) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty-panel">
            <div>
              ${emptyIcon()}
              <div class="empty-panel-title">Invalid cluster route</div>
              <a class="section-link" href="/clusters">Back to clusters</a>
            </div>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`/api/clusters/${clusterId}`);
        if (!res.ok) throw new Error('cluster not found');
        const cluster = await res.json();
        const [company, related] = await Promise.all([
          fetchCompany(cluster.ticker),
          fetchOtherClusters(cluster.ticker, cluster.cluster_id),
        ]);

        const companyName = company?.name || `${cluster.ticker} cluster`;
        document.title = `${cluster.ticker} Cluster - ASX Insider Tracker`;

        const trades = [...(cluster.trades || [])].sort((a, b) => String(a.date_of_trade).localeCompare(String(b.date_of_trade)));

        document.getElementById('mainContent').innerHTML = `
          <section class="detail-hero">
            <div class="detail-hero-top">
              <div class="detail-title">
                <h1>${escapeHtml(companyName)}</h1>
                <span class="tag-ticker">${escapeHtml(cluster.ticker)}</span>
                ${cluster.sector ? `<span class="badge badge-info-soft">${escapeHtml(cluster.sector)}</span>` : ''}
                ${statusBadge(cluster.status)}
              </div>
              <a class="section-link" href="/clusters">&larr; Back to clusters</a>
            </div>
            <div class="detail-meta-grid">
              <div>
                <div class="meta-label">Market Cap</div>
                <div class="meta-value money">${fmtMoney(cluster.market_cap_aud)}</div>
              </div>
              <div>
                <div class="meta-label">Last Price</div>
                <div class="meta-value money" id="lastPriceValue">-</div>
              </div>
              <div>
                <div class="meta-label">Cluster Window</div>
                <div class="meta-value">${fmtWindow(cluster.start_date, cluster.end_date)}</div>
              </div>
              <div>
                <div class="meta-label">Total Bought</div>
                <div class="meta-value money">${fmtMoney(cluster.total_value_aud)}</div>
              </div>
              <div>
                <div class="meta-label">Directors</div>
                <div class="meta-value num">${Number(cluster.director_count || 0).toLocaleString('en-AU')}</div>
              </div>
              <div>
                <div class="meta-label">% Market Cap</div>
                <div class="meta-value pct">${fmtPct(cluster.pct_market_cap)}</div>
              </div>
              <div>
                <div class="meta-label">Max Disclosure</div>
                <div class="meta-value">${fmtDate(cluster.max_disclosure_date)}</div>
              </div>
              <div>
                <div class="meta-label">Cap Bucket</div>
                <div class="meta-value">${escapeHtml(cluster.market_cap_bucket || '-')}</div>
              </div>
            </div>
          </section>

          <section class="page-section" aria-labelledby="timelineTitle">
            <div class="page-section-header">
              <div>
                <h2 id="timelineTitle">Cluster Timeline</h2>
                <p>Director trades that constitute this cluster, ordered by trade date.</p>
              </div>
            </div>
            <div class="timeline">
              ${trades.length ? trades.map(renderTimelineTrade).join('') : `
                <div class="empty-panel">
                  <div>
                    ${emptyIcon()}
                    <div class="empty-panel-title">No trade rows attached to this cluster</div>
                    <a class="section-link" href="/clusters">Back to clusters</a>
                  </div>
                </div>`}
            </div>
          </section>

          <section class="page-section" aria-labelledby="priceChartTitle">
            <div class="page-section-header">
              <div>
                <h2 id="priceChartTitle">Price Overlay</h2>
                <p><span class="chart-inline-label" style="--label-color:var(--accent)">Price</span> with buy, sell, and off-market director trade markers.</p>
              </div>
            </div>
            <div class="chart-panel">
              <div class="chart-panel-toolbar">
                <div class="chart-inline-labels" aria-hidden="true">
                  <span class="chart-inline-label" style="--label-color:var(--accent)">Price</span>
                  <span class="chart-inline-label" style="--label-color:var(--buy)">Buy</span>
                  <span class="chart-inline-label" style="--label-color:var(--sell)">Sell</span>
                  <span class="chart-inline-label" style="--label-color:var(--text-3)">Off-market</span>
                </div>
              </div>
              <div class="chart-stage" id="clusterPriceChartStage" role="img" aria-label="Cluster price history chart">
                <span class="skeleton skeleton-block"></span>
              </div>
            </div>
          </section>

          <section class="page-section" aria-labelledby="relatedTitle">
            <div class="page-section-header">
              <div>
                <h2 id="relatedTitle">Other Clusters at this Company</h2>
                <p>Additional cluster-buy signals for the same ticker, where available.</p>
              </div>
            </div>
            <div class="cluster-list">
              ${related.length ? related.map(renderRelatedCluster).join('') : `
                <div class="empty-panel">
                  <div>
                    ${emptyIcon()}
                    <div class="empty-panel-title">No other clusters found</div>
                    <div class="empty-panel-copy">This ticker has no other fetched cluster rows.</div>
                    <a class="section-link" href="/clusters">View all clusters &rarr;</a>
                  </div>
                </div>`}
            </div>
          </section>
        `;
        loadClusterPriceHistory(cluster.cluster_id);
      } catch (error) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty-panel">
            <div>
              ${emptyIcon()}
              <div class="empty-panel-title">Cluster not found</div>
              <div class="empty-panel-copy">Return to the cluster list and choose another signal.</div>
              <a class="section-link" href="/clusters">Back to clusters</a>
            </div>
          </div>`;
      }
    }

    window.addEventListener('resize', () => {
      if (clusterPricePayload) renderClusterPriceChart(clusterPricePayload);
    });

    init();
  </script>
</body>
</html>
